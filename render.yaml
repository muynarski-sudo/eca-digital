services:
  - type: web
    name: eca-digital
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: eca-digital-secret-2026-compliance
      - key: PORT
        value: 3002
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
